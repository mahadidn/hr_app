services:
  app:
    build:
      context: ..
      dockerfile: .docker/php/Dockerfile
    volumes:
      - ..:/var/www/html:cached   
    command: sleep infinity        
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=hr_db
      - DB_USERNAME=hr_user
      - DB_PASSWORD=secret
    depends_on:
      - postgres

  postgres:
    image: postgres:13
    restart: unless-stopped
    environment:
      POSTGRES_DB: hr_db
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres-data: